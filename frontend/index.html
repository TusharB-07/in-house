<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo / SmartWaste Studio</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }
        .login-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 3.5rem;
            border-radius: 2.5rem;
            text-align: left;
        }
        input {
            width: 100%;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            color: #fff;
            font-size: 1rem;
        }
        input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .error-msg {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 2rem;
            display: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div style="text-align: center; margin-bottom: 4rem;">
            <div style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; color: var(--accent-primary); margin-bottom: 1rem;">SRM University</div>
            <div style="font-size: 2rem; font-weight: 700; letter-spacing: -0.05em;">SmartWaste.</div>
        </div>

        <div class="login-card">
            <h2 style="font-size: 1.5rem; margin-bottom: 2.5rem; letter-spacing: -0.02em;">Account Access.</h2>
            <form id="login-form">
                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 600;">Student ID</p>
                <input type="text" id="student_id" placeholder="RA2211..." required>
                
                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 600;">Security Signature</p>
                <input type="password" id="password" placeholder="••••••••" required>
                
                <button type="submit" id="login-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1.2rem;">Verify Identity</button>
                <a href="signup.html" class="btn btn-outline" style="width: 100%; margin-top: 1rem; padding: 1.2rem; text-decoration: none; display: block; text-align: center; border-radius: 100px;">Create Account</a>
            </form>
            <div id="error-msg" class="error-msg">Invalid Credentials</div>
        </div>

        <div style="text-align: center; margin-top: 4rem; color: var(--text-secondary); font-size: 0.8rem;">
            Forgot your signature? <br>Contact system administrator.
        </div>
    </div>

    <script type="module">
        import { api } from './js/api.js';

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentId = document.getElementById('student_id').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.innerText = 'Syncing...';
            errorMsg.style.display = 'none';

            try {
                const data = await api.login(studentId, password);
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('name', data.name);
                localStorage.setItem('student_id', studentId);

                if (data.role === 'admin' || data.role === 'staff') {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'student.html';
                }
            } catch (err) {
                errorMsg.innerText = err;
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerText = 'Verify Identity';
            }
        });

        // Check if already logged in
        if (localStorage.getItem('token')) {
            const role = localStorage.getItem('role');
            if (role === 'admin' || role === 'staff') window.location.href = 'dashboard.html';
            else window.location.href = 'student.html';
        }
    </script>
</body>
</html>
