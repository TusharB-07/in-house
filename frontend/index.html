<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECOIN / Account Access</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 2rem;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 3rem;
            border-radius: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        .hero-text-mini {
            font-size: 3rem;
            font-weight: 800;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 2.5rem;
            color: #1a1a1a;
        }
        input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #ddd;
            border-radius: 1.2rem;
            font-size: 1rem;
            outline: none;
            font-weight: 600;
        }
        input:focus {
            border-color: #588157;
            background: #fff;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="mobile-logo">ECOIN</div>
            <nav class="header-actions">
                <a href="index.html" class="header-btn dark">Login</a>
                <a href="signup.html" class="header-btn">Sign up</a>
            </nav>
        </div>
    </header>

    <div class="login-card">
        <p style="font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; color: var(--text-secondary); margin-bottom: 1rem;">Secure Access</p>
        <h1 class="hero-text-mini">ACCOUNT <br>PORTAL.</h1>
        
        <form id="login-form">
            <p style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #1a1a1a; margin-bottom: 0.75rem; font-weight: 800;">Student Identifier</p>
            <input type="text" id="student_id" placeholder="RA2211..." required>
            
            <p style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: #1a1a1a; margin-bottom: 0.75rem; font-weight: 800;">Security Key</p>
            <input type="password" id="password" placeholder="••••••••" required>
            
            <button type="submit" id="login-btn" class="btn btn-dark" style="width: 100%; margin-top: 1rem; padding: 1.2rem;">Verify Identity</button>
            <a href="signup.html" style="display:block; text-align:center; margin-top:1.5rem; color:var(--text-secondary); font-size:0.75rem; text-decoration:none; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">Initialize New Account</a>
        </form>
        <div id="error-msg" style="color: var(--error); font-size: 0.75rem; margin-top: 2rem; display: none; font-weight: 800; text-transform: uppercase; text-align: center;">Invalid Credentials</div>
    </div>

    <script src="js/api.js" type="module"></script>
    <script src="js/mock-login.js"></script>
    <script src="js/auth.js"></script>
    <script type="module">
        import { api } from './js/api.js';

        const loginForm = document.getElementById('login-form');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentId = document.getElementById('student_id').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.innerText = 'Verifying...';
            errorMsg.style.display = 'none';

            try {
                const data = await api.login(studentId, password);
                localStorage.setItem('token', data.token);
                localStorage.setItem('role', data.role);
                localStorage.setItem('name', data.name);
                localStorage.setItem('student_id', studentId);

                window.location.href = 'student.html';
            } catch (err) {
                errorMsg.innerText = err;
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerText = 'Verify Identity';
            }
        });
    </script>
</body>
</html>
