<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Smart Waste</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--accent-mid), var(--accent-deep));
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--highlight);
            border: 2px solid var(--border-color);
        }
        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        .qr-section {
            text-align: center;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            border: 1px dashed var(--border-color);
        }
        .qr-placeholder {
            width: 150px;
            height: 150px;
            background: white;
            margin: 0 auto 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-weight: 700;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">SMART WASTE</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="profile.html" class="active">Profile</a>
            <a href="leaderboard.html">Leaderboard</a>
        </div>
        <div id="nav-auth"></div>
    </nav>

    <div class="container">
        <div class="profile-header">
            <div class="avatar" id="user-avatar">?</div>
            <div>
                <h1 id="user-name" style="margin-bottom: 0.5rem;">Loading...</h1>
                <p id="user-id" style="color: var(--text-secondary);"></p>
            </div>
        </div>

        <div class="stats-summary">
            <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                <p style="font-size: 0.8rem; color: var(--text-secondary);">Total Points</p>
                <h2 id="stat-points" style="font-size: 2.5rem; margin: 0.5rem 0;">0</h2>
                <p id="stat-rank" style="font-size: 0.8rem; color: var(--highlight);">Rank #--</p>
            </div>
            <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                <p style="font-size: 0.8rem; color: var(--text-secondary);">Current Streak</p>
                <h2 id="stat-streak" style="font-size: 2.5rem; margin: 0.5rem 0;">0</h2>
                <p style="font-size: 0.8rem; color: var(--highlight);">Days 🔥</p>
            </div>
            <div class="glass-card" style="padding: 1.5rem; text-align: center;">
                <p style="font-size: 0.8rem; color: var(--text-secondary);">Accuracy</p>
                <h2 id="stat-accuracy" style="font-size: 2.5rem; margin: 0.5rem 0;">0%</h2>
                <p id="stat-total" style="font-size: 0.8rem; color: var(--text-secondary);">0 total disposals</p>
            </div>
        </div>

        <div class="grid" style="grid-template-columns: 2fr 1fr;">
            <div>
                <h3>Recent Activity</h3>
                <div class="glass-card" style="padding: 1.5rem;">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Bin</th>
                                    <th>Type</th>
                                    <th>Points</th>
                                </tr>
                            </thead>
                            <tbody id="activity-body">
                                <tr><td colspan="4" style="text-align: center;">Loading history...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div>
                <h3>My QR ID</h3>
                <div class="glass-card" style="padding: 1.5rem;">
                    <div class="qr-section">
                        <div class="qr-placeholder" id="qr-code">QR</div>
                        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1rem;">Show this at the bin to earn points</p>
                        <button class="btn btn-primary" style="width: 100%; font-size: 0.8rem;">Download PNG</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function loadProfile() {
            const userStr = localStorage.getItem('sw_user');
            if (!userStr) {
                window.location.href = 'index.html';
                return;
            }
            const user = JSON.parse(userStr);
            
            try {
                const data = await api.getStudentProfile(user.student_id);
                if (data.error) throw new Error(data.error);

                const s = data.student;
                document.getElementById('user-name').innerText = s.name;
                document.getElementById('user-id').innerText = s.student_id;
                document.getElementById('user-avatar').innerText = s.name.charAt(0);
                
                document.getElementById('stat-points').innerText = s.points;
                document.getElementById('stat-rank').innerText = `Rank #${data.rank}`;
                document.getElementById('stat-streak').innerText = s.streak_days || 0;
                
                const accuracy = s.total_disposals > 0 
                    ? Math.round((s.correct_disposals / s.total_disposals) * 100) 
                    : 0;
                document.getElementById('stat-accuracy').innerText = `${accuracy}%`;
                document.getElementById('stat-total').innerText = `${s.total_disposals} total disposals`;
                
                // Update QR (just text placeholder for now)
                document.getElementById('qr-code').innerText = s.qr_code || 'N/A';

                // Update History
                const tbody = document.getElementById('activity-body');
                tbody.innerHTML = '';
                if (data.disposals.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No activity yet.</td></tr>';
                } else {
                    data.disposals.forEach(d => {
                        const date = new Date(d.timestamp).toLocaleDateString();
                        const row = `
                            <tr>
                                <td>${date}</td>
                                <td>${d.bin_id}</td>
                                <td><span class="badge ${d.is_correct ? 'badge-success' : 'badge-error'}">${d.type}</span></td>
                                <td style="font-weight: 700; color: var(--highlight);">+${d.points_awarded}</td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    });
                }

            } catch (err) {
                console.error(err);
                alert("Failed to load profile data.");
            }
        }
        document.addEventListener('DOMContentLoaded', loadProfile);
    </script>
</body>
</html>
