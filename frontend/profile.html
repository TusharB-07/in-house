<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo / SmartWaste Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-info-section {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .activity-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-color);
        }
        .activity-details h4 {
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }
        .activity-details p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
        }
        .activity-points {
            font-weight: 800;
            font-size: 1.1rem;
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="mobile-logo">ECOIN</div>
            <div class="header-actions" style="display: flex; gap: 0.75rem;">
                <a href="profile.html" class="header-btn">
                    <div class="avatar-circle" id="header-avatar" style="width: 20px; height: 20px; font-size: 0.5rem; border: none; background: #a3b18a; color: #1a1a1a;">?</div>
                    Hello, <span id="header-user-name">User</span>
                </a>
                <button onclick="logout()" class="header-btn" style="padding: 0.7rem; aspect-ratio: 1; justify-content: center;" title="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- BOTTOM NAVIGATION (Mobile Only) -->
        <nav class="bottom-nav">
            <a href="student.html" class="bottom-nav-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                <span>Disposal</span>
            </a>
            <a href="leaderboard.html" class="bottom-nav-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                <span>Rankings</span>
            </a>
            <a href="profile.html" class="bottom-nav-link active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </a>
        </nav>

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-card">
                <div class="profile-cover"></div>
                <div class="sidebar-content" style="text-align: center; margin-top: -30px; position: relative; z-index: 10;">
                    <div class="avatar-circle" id="sidebar-avatar" style="width: 80px; height: 80px; font-size: 2rem; margin: 0 auto 1rem; border: 4px solid #fff; background: #a3b18a;">?</div>
                    <h3 id="sidebar-name" style="margin-bottom: 0.2rem; font-size: 1.4rem;">Student User</h3>
                    <p id="sidebar-id" style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 700;">RA2211000000</p>
                </div>
            </div>

            <button onclick="logout()" class="btn btn-dark" style="margin-top: auto; width: 100%;">Exit Session</button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" style="padding-top: 8rem;">
            <p class="sub-hero">Your Performance Registry</p>
            <h1 class="hero-text">MY <br>PROFILE.</h1>

            <div class="profile-info-section">
                <!-- Credits & Streak -->
                <div class="stat-row">
                    <div class="stat-pill">
                        <span class="label">Balance</span>
                        <span class="value" id="total-points">00</span>
                    </div>
                    <div class="stat-pill">
                        <span class="label">Daily Streak</span>
                        <span class="value" id="total-streak">00</span>
                    </div>
                    <div class="stat-pill">
                        <span class="label">Campus Rank</span>
                        <span class="value" id="total-rank">#--</span>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div style="margin-top: 2rem;">
                    <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 1.5rem; font-weight: 800;">Recent Transmissions</p>
                    <div id="activity-list">
                        <!-- Activity items injected here -->
                        <p style="text-align: center; padding: 2rem; color: var(--text-secondary); font-weight: 700;">Loading Archive...</p>
                    </div>
                </div>
            </div>
            
            <img src="https://png.pngtree.com/png-vector/20231017/ourmid/pngtree-trash-can-clipart-green-recycling-bin-side-view-vector-png-image_10203597.png" alt="Recycle Bin" class="bg-object">
        </main>
    </div>

    <script type="module">
        import { api } from './js/api.js';

        async function initProfile() {
            const studentId = localStorage.getItem('student_id');
            const name = localStorage.getItem('name');
            
            if (!studentId) {
                window.location.href = 'index.html';
                return;
            }

            // Set basic info
            document.getElementById('sidebar-name').innerText = name;
            document.getElementById('sidebar-id').innerText = studentId;
            const initials = name.split(' ').map(n => n[0]).join('');
            document.getElementById('sidebar-avatar').innerText = initials;
            document.getElementById('header-avatar').innerText = initials;
            document.getElementById('header-user-name').innerText = name.split(' ')[0];

            try {
                const data = await api.getStudentProfile(studentId);
                const s = data.student;
                
                // Set stats
                document.getElementById('total-points').innerText = s.points.toString().padStart(2, '0');
                document.getElementById('total-streak').innerText = (s.streak_days || 0).toString().padStart(2, '0');
                document.getElementById('total-rank').innerText = `#${data.rank.toString().padStart(2, '0')}`;

                // Set activity
                const activityList = document.getElementById('activity-list');
                activityList.innerHTML = '';

                if (data.disposals.length === 0) {
                    activityList.innerHTML = '<p style="text-align: center; padding: 2rem; color: var(--text-secondary); font-weight: 700;">No transmissions recorded yet.</p>';
                } else {
                    data.disposals.slice(0, 5).forEach(d => {
                        const date = new Date(d.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                        activityList.innerHTML += `
                            <div class="activity-card">
                                <div class="activity-details">
                                    <h4>${d.bin_id} - ${d.type}</h4>
                                    <p>${date}</p>
                                </div>
                                <div class="activity-points">+${d.points_awarded}</div>
                            </div>
                        `;
                    });
                }

            } catch (e) {
                console.error(e);
                alert("Failed to sync profile data.");
            }
        }

        document.addEventListener('DOMContentLoaded', initProfile);
    </script>
    <script src="js/mock-login.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
