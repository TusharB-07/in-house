<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register / SmartWaste</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
        .login-container { width: 100%; max-width: 450px; padding: 2rem; }
        .login-card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 3.5rem; border-radius: 2.5rem; }
        input { width: 100%; padding: 1.2rem; margin-bottom: 1.5rem; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 1rem; color: #fff; font-size: 1rem; }
        .error-msg { color: var(--error); font-size: 0.85rem; margin-top: 2rem; display: none; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .success-msg { color: var(--success); font-size: 0.85rem; margin-top: 2rem; display: none; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2 style="font-size: 1.5rem; margin-bottom: 2.5rem; letter-spacing: -0.02em;">Create Account.</h2>
            <form id="signup-form">
                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 600;">Full Name</p>
                <input type="text" id="name" placeholder="Priya Sharma" required>

                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 600;">Student ID</p>
                <input type="text" id="student_id" placeholder="RA2211..." required>

                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 600;">University Email</p>
                <input type="email" id="email" placeholder="priya@srmist.edu.in" required>
                
                <p style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-secondary); margin-bottom: 0.75rem; font-weight: 600;">Password</p>
                <input type="password" id="password" placeholder="••••••••" required>
                
                <button type="submit" id="signup-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1.2rem;">Register</button>
                <a href="index.html" style="display:block; text-align:center; margin-top:2rem; color:var(--text-secondary); font-size:0.85rem; text-decoration:none;">Back to Login</a>
            </form>
            <div id="error-msg" class="error-msg"></div>
            <div id="success-msg" class="success-msg">Account created! Redirecting...</div>
        </div>
    </div>

    <script type="module">
        import { api } from './js/api.js';

        const signupForm = document.getElementById('signup-form');
        const signupBtn = document.getElementById('signup-btn');
        const errorMsg = document.getElementById('error-msg');
        const successMsg = document.getElementById('success-msg');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                student_id: document.getElementById('student_id').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };

            signupBtn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await api.signup(data);
                successMsg.style.display = 'block';
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (err) {
                errorMsg.innerText = err;
                errorMsg.style.display = 'block';
                signupBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
