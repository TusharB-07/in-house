<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive / SmartWaste</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filter-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
            align-items: end;
        }
        .filter-item label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            font-weight: 700;
        }
        select, input[type="date"], input[type="text"] {
            width: 100%;
            padding: 0.8rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            color: #fff;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Halo / SmartWaste</div>
        <div class="nav-links">
            <a href="dashboard.html">Network</a>
            <a href="logs.html" class="active">Archive</a>
            <a href="leaderboard.html">Rankings</a>
            <a href="admin.html">Control</a>
        </div>
        <div id="nav-auth"></div>
    </nav>

    <div class="container">
        <header style="margin: 6rem 0 4rem;">
            <p style="color: var(--accent-primary); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 2rem;">Historical Data</p>
            <h1 style="font-size: 6rem; letter-spacing: -0.05em;">Log <br>Archive.</h1>
        </header>

        <div class="glass-card" style="padding: 3rem; border-radius: 2rem; margin-bottom: 4rem;">
            <div class="filter-bar">
                <div class="filter-item">
                    <label>Node ID</label>
                    <select id="filter-bin">
                        <option value="">All Nodes</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>Classification</label>
                    <select id="filter-type">
                        <option value="">All Types</option>
                        <option value="dry">Dry Waste</option>
                        <option value="wet">Wet Waste</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>Identity</label>
                    <input type="text" id="filter-student" placeholder="RA2211...">
                </div>
                <div class="filter-item">
                    <label>Date</label>
                    <input type="date" id="filter-date">
                </div>
                <div class="filter-item">
                    <button id="apply-filters" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">Apply</button>
                </div>
                <div class="filter-item">
                    <button id="export-csv" class="btn btn-outline" style="width: 100%; padding: 0.8rem; border-radius: 0.75rem;">Export CSV</button>
                </div>
            </div>
        </div>

        <div class="glass-card" style="padding: 0; border-radius: 2rem; overflow: hidden; margin-bottom: 6rem;">
            <div class="table-container">
                <table style="margin: 0; width: 100%;">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Node</th>
                            <th>Identity</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Points</th>
                        </tr>
                    </thead>
                    <tbody id="logs-body">
                        <!-- Logs here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div style="display: flex; justify-content: center; gap: 2rem; margin-bottom: 10rem;">
            <button id="prev-page" class="btn btn-outline" style="padding: 0.8rem 2rem; border-radius: 100px;">← Previous</button>
            <span id="page-info" style="align-self: center; font-weight: 600; color: var(--text-secondary); font-size: 0.85rem;">Page 1 of 1</span>
            <button id="next-page" class="btn btn-outline" style="padding: 0.8rem 2rem; border-radius: 100px;">Next →</button>
        </div>
    </div>

    <script type="module">
        import { api } from './js/api.js';

        let currentPage = 1;
        let totalPages = 1;

        async function loadBins() {
            try {
                const bins = await api.getAllBins();
                const select = document.getElementById('filter-bin');
                bins.forEach(bin => {
                    const opt = document.createElement('option');
                    opt.value = bin.bin_id;
                    opt.innerText = `Node ${bin.bin_id} (${bin.location})`;
                    select.appendChild(opt);
                });
            } catch (e) {}
        }

        async function loadLogs(page = 1) {
            const params = {
                page: page,
                limit: 20,
                bin_id: document.getElementById('filter-bin').value,
                waste_type: document.getElementById('filter-type').value,
                student_id: document.getElementById('filter-student').value,
                date: document.getElementById('filter-date').value
            };

            try {
                const data = await api.getDisposals(params);
                const tbody = document.getElementById('logs-body');
                tbody.innerHTML = '';

                data.disposals.forEach(d => {
                    const date = new Date(d.timestamp).toLocaleString([], { dateStyle: 'short', timeStyle: 'short' });
                    const row = `
                        <tr style="border-bottom: 1px solid rgba(255,255,255,0.02);">
                            <td style="font-size: 0.8rem; color: var(--text-secondary);">${date}</td>
                            <td style="font-weight: 700;">${d.bin_id}</td>
                            <td style="font-size: 0.85rem;">${d.student_id || '<span style="color: var(--text-secondary);">Anonymous</span>'}</td>
                            <td><span class="badge badge-${d.waste_type}">${d.waste_type}</span></td>
                            <td style="color: ${d.is_correct ? 'var(--success)' : 'var(--error)'}; font-weight: 700; font-size: 0.75rem;">${d.is_correct ? 'SUCCESS' : 'MISPLACED'}</td>
                            <td style="color: var(--accent-primary); font-weight: 700;">+${d.points_awarded}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

                currentPage = data.page;
                totalPages = data.pages;
                document.getElementById('page-info').innerText = `Page ${currentPage} of ${totalPages}`;
                document.getElementById('prev-page').disabled = currentPage <= 1;
                document.getElementById('next-page').disabled = currentPage >= totalPages;

            } catch (err) { console.error(err); }
        }

        document.getElementById('apply-filters').onclick = () => loadLogs(1);
        document.getElementById('prev-page').onclick = () => { if (currentPage > 1) loadLogs(currentPage - 1); };
        document.getElementById('next-page').onclick = () => { if (currentPage < totalPages) loadLogs(currentPage + 1); };

        document.getElementById('export-csv').onclick = async () => {
            const params = {
                limit: 1000,
                bin_id: document.getElementById('filter-bin').value,
                waste_type: document.getElementById('filter-type').value,
                student_id: document.getElementById('filter-student').value,
                date: document.getElementById('filter-date').value
            };
            try {
                const data = await api.getDisposals(params);
                const disposals = data.disposals;
                if (!disposals.length) { alert("No data to export"); return; }

                const headers = ["Timestamp", "Bin ID", "Student ID", "Waste Type", "Is Correct", "Points"];
                const rows = disposals.map(d => [
                    d.timestamp,
                    d.bin_id,
                    d.student_id || 'Anonymous',
                    d.waste_type,
                    d.is_correct,
                    d.points_awarded
                ]);

                let csvContent = "data:text/csv;charset=utf-8," 
                    + headers.join(",") + "\n"
                    + rows.map(e => e.join(",")).join("\n");

                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `disposals_export_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) { alert("Export failed"); }
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadBins();
            loadLogs();
        });
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
