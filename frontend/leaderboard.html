<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo / SmartWaste Rankings</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .leaderboard-section {
            margin-top: 2rem;
        }
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 1rem;
            margin-bottom: 3rem;
            padding-top: 2rem;
        }
        .podium-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 120px;
        }
        .podium-bar {
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem 1.5rem 0 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            border: 1px solid var(--border-color);
        }
        .rank-1 .podium-bar { height: 160px; background: rgba(163, 177, 138, 0.3); border-color: #a3b18a; }
        .rank-2 .podium-bar { height: 130px; }
        .rank-3 .podium-bar { height: 100px; }

        .leader-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            margin-bottom: -25px;
            z-index: 1;
            border: 2px solid var(--border-color);
            font-size: 1rem;
        }
        .rank-1 .leader-avatar { border-color: #a3b18a; width: 60px; height: 60px; margin-bottom: -30px; }

        .rank-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 0.75rem;
        }
        .rank-row {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 1rem;
        }
        .rank-row td {
            padding: 1.2rem 1rem;
        }
        .rank-row td:first-child { border-radius: 1rem 0 0 1rem; padding-left: 1.5rem; }
        .rank-row td:last-child { border-radius: 0 1rem 1rem 0; padding-right: 1.5rem; text-align: right; }
        
        .user-highlight {
            background: rgba(163, 177, 138, 0.2);
            border: 1px solid #a3b18a;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-content">
            <div class="mobile-logo">ECOIN</div>
            <div class="header-actions" style="display: flex; gap: 0.75rem;">
                <a href="profile.html" class="header-btn">
                    <div class="avatar-circle" id="header-avatar" style="width: 20px; height: 20px; font-size: 0.5rem; border: none; background: #a3b18a; color: #1a1a1a;">?</div>
                    Hello, <span id="header-user-name">User</span>
                </a>
                <button onclick="logout()" class="header-btn" style="padding: 0.7rem; aspect-ratio: 1; justify-content: center;" title="Logout">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="app-container">
        <!-- BOTTOM NAVIGATION -->
        <nav class="bottom-nav">
            <a href="student.html" class="bottom-nav-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                <span>Disposal</span>
            </a>
            <a href="leaderboard.html" class="bottom-nav-link active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"></path><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"></path><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"></path></svg>
                <span>Rankings</span>
            </a>
            <a href="profile.html" class="bottom-nav-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                <span>Profile</span>
            </a>
        </nav>

        <!-- SIDEBAR (Hidden on mobile) -->
        <aside class="sidebar">
            <div class="sidebar-card">
                <div class="profile-cover"></div>
                <div class="sidebar-content" style="text-align: center; margin-top: -30px; position: relative; z-index: 10;">
                    <div class="avatar-circle" id="sidebar-avatar" style="width: 80px; height: 80px; font-size: 2rem; margin: 0 auto 1rem; border: 4px solid #fff; background: #a3b18a;">?</div>
                    <h3 id="sidebar-name">Student User</h3>
                    <p id="sidebar-id" style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 700;">RA2211000000</p>
                </div>
            </div>
            <button onclick="logout()" class="btn btn-dark" style="margin-top: auto; width: 100%;">Exit Session</button>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content" style="padding-top: 8rem;">
            <p class="sub-hero">Global Eco-Champions</p>
            <h1 class="hero-text">THE <br>RANKINGS.</h1>

            <div class="leaderboard-section">
                <!-- TOP 3 PODIUM -->
                <div class="podium-container" id="podium-list">
                    <!-- Podium items injected here -->
                </div>

                <!-- FULL LIST -->
                <table class="rank-table">
                    <tbody id="leaderboard-body">
                        <!-- Rankings injected here -->
                    </tbody>
                </table>
            </div>

            <img src="https://png.pngtree.com/png-vector/20231017/ourmid/pngtree-trash-can-clipart-green-recycling-bin-side-view-vector-png-image_10203597.png" alt="Recycle Bin" class="bg-object">
        </main>
    </div>

    <script type="module">
        import { api } from './js/api.js';

        async function initLeaderboard() {
            const currentStudentId = localStorage.getItem('student_id');
            const name = localStorage.getItem('name') || "User";
            const initials = name.split(' ').map(n => n[0]).join('');
            
            document.getElementById('sidebar-name').innerText = name;
            document.getElementById('sidebar-id').innerText = currentStudentId;
            document.getElementById('sidebar-avatar').innerText = initials;
            document.getElementById('header-avatar').innerText = initials;
            document.getElementById('header-user-name').innerText = name.split(' ')[0];

            try {
                const leaderboard = await api.getLeaderboard();
                
                // Podium Logic
                const podiumList = document.getElementById('podium-list');
                podiumList.innerHTML = '';
                if (leaderboard.length >= 3) {
                    const top3 = [leaderboard[1], leaderboard[0], leaderboard[2]]; // 2nd, 1st, 3rd
                    top3.forEach((s, i) => {
                        const rankNum = i === 0 ? 2 : (i === 1 ? 1 : 3);
                        const sInitials = s.name.split(' ').map(n => n[0]).join('');
                        podiumList.innerHTML += `
                            <div class="podium-item rank-${rankNum}">
                                <div class="leader-avatar">${sInitials}</div>
                                <div class="podium-bar">
                                    <span style="font-weight: 800; font-size: 1.1rem;">${s.points}</span>
                                    <span style="font-size: 0.6rem; text-transform: uppercase; font-weight: 700; color: var(--text-secondary);">${s.name.split(' ')[0]}</span>
                                </div>
                            </div>
                        `;
                    });
                }

                // Table Logic
                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';
                leaderboard.forEach(s => {
                    const isUser = s.student_id === currentStudentId;
                    const row = `
                        <tr class="rank-row ${isUser ? 'user-highlight' : ''}">
                            <td style="font-weight: 800; width: 50px;">#${s.rank}</td>
                            <td style="font-weight: 700;">${s.name} ${isUser ? '(You)' : ''}</td>
                            <td style="font-weight: 800; color: #1a1a1a;">${s.points} CR</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

            } catch (e) { console.error(e); }
        }

        document.addEventListener('DOMContentLoaded', initLeaderboard);
    </script>
    <script src="js/mock-login.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
