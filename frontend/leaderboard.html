<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard / SmartWaste</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 2rem;
            margin: 8rem 0;
            height: 300px;
        }
        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            max-width: 200px;
        }
        .podium-rank {
            width: 100%;
            border-radius: 1.5rem 1.5rem 0 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }
        .rank-1 { height: 100%; background: linear-gradient(180deg, rgba(255,215,0,0.2) 0%, rgba(255,215,0,0.05) 100%); border: 1px solid rgba(255,215,0,0.3); }
        .rank-2 { height: 80%; background: linear-gradient(180deg, rgba(192,192,192,0.2) 0%, rgba(192,192,192,0.05) 100%); border: 1px solid rgba(192,192,192,0.3); }
        .rank-3 { height: 65%; background: linear-gradient(180deg, rgba(205,127,50,0.2) 0%, rgba(205,127,50,0.05) 100%); border: 1px solid rgba(205,127,50,0.3); }
        
        .avatar {
            width: 60px; height: 60px;
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
        }
        .rank-1 .avatar { border-color: #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
        
        .highlighted-row { background: rgba(0, 255, 157, 0.05) !important; border-left: 4px solid var(--accent-primary) !important; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Halo / SmartWaste</div>
        <div class="nav-links" id="nav-links">
            <a href="dashboard.html">Network</a>
            <a href="logs.html">Archive</a>
            <a href="leaderboard.html" class="active">Rankings</a>
        </div>
        <div id="nav-auth"></div>
    </nav>

    <div class="container">
        <header style="margin: 6rem 0 4rem; text-align: center;">
            <p style="color: var(--accent-primary); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 2rem;">Campus Honor Roll</p>
            <h1 style="font-size: 6rem; letter-spacing: -0.05em;">The <br>Leaderboard.</h1>
        </header>

        <div class="podium" id="podium-container">
            <!-- Podium injected here -->
        </div>

        <div class="glass-card" style="padding: 0; border-radius: 2rem; overflow: hidden; margin-bottom: 10rem;">
            <div class="table-container">
                <table style="margin: 0; width: 100%;">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Student</th>
                            <th>Points</th>
                            <th>Units</th>
                            <th>Streak</th>
                            <th>Accuracy</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Rankings here -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <div id="user-rank-footer" style="margin-bottom: 10rem; display: none;">
            <p style="color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem; font-weight: 700; margin-bottom: 2rem;">Your Position</p>
            <div class="glass-card" style="padding: 0; border-radius: 2rem; overflow: hidden;">
                <table style="margin: 0; width: 100%;">
                    <tbody id="user-rank-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { api } from './js/api.js';

        async function loadLeaderboard() {
            try {
                const leaderboard = await api.getLeaderboard();
                const currentStudentId = localStorage.getItem('student_id');
                const role = localStorage.getItem('role');

                // Adjust nav based on role
                const navLinks = document.getElementById('nav-links');
                if (role === 'student') {
                    navLinks.innerHTML = `
                        <a href="student.html">Dashboard</a>
                        <a href="leaderboard.html" class="active">Rankings</a>
                    `;
                }

                // Podium
                const podium = document.getElementById('podium-container');
                podium.innerHTML = '';
                if (leaderboard.length >= 3) {
                    const top3 = [leaderboard[1], leaderboard[0], leaderboard[2]]; // Order: 2, 1, 3
                    top3.forEach((s, i) => {
                        const rankClass = i === 1 ? 'rank-1' : (i === 0 ? 'rank-2' : 'rank-3');
                        const initials = s.name.split(' ').map(n => n[0]).join('');
                        podium.innerHTML += `
                            <div class="podium-item">
                                <div class="avatar">${initials}</div>
                                <div class="podium-rank ${rankClass}">
                                    <div style="font-weight: 800; font-size: 1.5rem; margin-bottom: 0.5rem;">${s.points}</div>
                                    <div style="font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-secondary);">${s.name.split(' ')[0]} ${s.name.split(' ')[1][0]}.</div>
                                </div>
                            </div>
                        `;
                    });
                }

                // Table
                const tbody = document.getElementById('leaderboard-body');
                tbody.innerHTML = '';
                let userInTop20 = false;

                leaderboard.forEach(s => {
                    const isUser = s.student_id === currentStudentId;
                    if (isUser) userInTop20 = true;

                    const accuracy = s.total_disposals > 0 ? Math.round((s.correct_disposals / s.total_disposals) * 100) : 0;
                    const streak = s.streak_days >= 7 ? `${s.streak_days} 🔥` : s.streak_days;
                    
                    const row = `
                        <tr class="${isUser ? 'highlighted-row' : ''}">
                            <td style="font-weight: 700; width: 80px;">#${s.rank}</td>
                            <td style="font-weight: 600;">${s.name.split(' ')[0]} ${s.name.split(' ')[1][0]}.</td>
                            <td style="color: var(--accent-primary); font-weight: 700;">${s.points}</td>
                            <td>${s.correct_disposals}</td>
                            <td>${streak}</td>
                            <td style="font-size: 0.85rem;">${accuracy}%</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

                // If user not in top 20, show separate footer
                if (!userInTop20 && role === 'student') {
                    const profile = await api.getStudentProfile(currentStudentId);
                    const s = profile.student;
                    const rank = profile.rank;
                    const accuracy = s.total_disposals > 0 ? Math.round((s.correct_disposals / s.total_disposals) * 100) : 0;
                    
                    document.getElementById('user-rank-footer').style.display = 'block';
                    const userBody = document.getElementById('user-rank-body');
                    userBody.innerHTML = `
                        <tr class="highlighted-row">
                            <td style="font-weight: 700; width: 80px; padding: 2rem 2.5rem;">#${rank}</td>
                            <td style="font-weight: 600; padding: 2rem 2.5rem;">${s.name} (You)</td>
                            <td style="color: var(--accent-primary); font-weight: 700; padding: 2rem 2.5rem;">${s.points}</td>
                            <td style="padding: 2rem 2.5rem;">${s.correct_disposals}</td>
                            <td style="padding: 2rem 2.5rem;">${s.streak_days}</td>
                            <td style="font-size: 0.85rem; padding: 2rem 2.5rem;">${accuracy}%</td>
                        </tr>
                    `;
                }

            } catch (err) { console.error(err); }
        }

        document.addEventListener('DOMContentLoaded', loadLeaderboard);
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
